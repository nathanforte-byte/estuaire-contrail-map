name: enrich-metadata

# Hourly enrichment of aircraft metadata from hexdb.io for icao24s we have
# observed in the last 24h. hexdb is free / community-run, so we hit it at
# ~1 req/sec with a single concurrent connection.

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

concurrency:
  group: enrich-metadata
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Show runner IP
        run: echo "Runner IP $(curl -sS -m 5 -4 https://ifconfig.io || echo unknown)"

      - name: Probe hexdb reachability (fast fail)
        id: probe
        run: |
          if curl -sS -m 8 -o /dev/null "https://hexdb.io/api/v1/aircraft/4CA7DE"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::hexdb.io unreachable — skipping"
          fi

      - uses: actions/setup-python@v5
        if: steps.probe.outputs.ok == 'true'
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: fetcher/requirements.txt

      - name: Install deps
        if: steps.probe.outputs.ok == 'true'
        run: pip install -r fetcher/requirements.txt

      - name: Run metadata enricher
        if: steps.probe.outputs.ok == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LOOKBACK_HOURS: "24"
          MAX_PER_RUN: "600"
          RATE_LIMIT_SECONDS: "1.0"
        run: python fetcher/enrich_metadata.py
