name: fetch-opensky

# Periodic OpenSky → Supabase fetcher. GitHub Actions Azure egress reaches
# OpenSky cleanly (GCP/AWS/CF are blacklisted at ETH Zurich).

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min (GitHub may delay 1-15 min under load)
  workflow_dispatch:

concurrency:
  group: fetch-opensky
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: fetcher/requirements.txt

      - run: pip install -r fetcher/requirements.txt

      - name: Run fetcher
        env:
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python fetcher/fetch_to_supabase.py
